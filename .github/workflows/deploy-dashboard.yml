name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: [data/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect worktree-named repos
        id: detect
        run: |
          BOGUS=$(python3 -c "
          from docs.normalize_repo_names import find_bogus_repos
          names = find_bogus_repos('data')
          print(' '.join(names))
          ")
          echo "bogus=$BOGUS" >> "$GITHUB_OUTPUT"
          if [ -n "$BOGUS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for worktree-named data
        if: steps.detect.outputs.found == 'true'
        run: |
          NAMES="${{ steps.detect.outputs.bogus }}"

          echo "::warning::Worktree-named repos need manual repair: $NAMES"

          BODY="## Worktree-named metrics need repair
The following repo directories use Docker-style random names from worktrees:

$(for name in $NAMES; do echo "- \`$name\`"; done)

### How to fix

1. Identify the real repo for each name (check SHAs, branch names, file paths in gate violations)
2. Run the repair script:
\`\`\`bash
python3 docs/normalize_repo_names.py data --repair $(for name in $NAMES; do echo "--map $name=REAL_REPO_NAME "; done)
\`\`\`
3. Commit and push the repaired data

### Prevention
Update the rq plugin: \`claude plugins update rq\` (v1.28.10+ fixes this)"

          EXISTING=$(gh issue list --label "stale-plugin" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Worktree-named metrics data needs repair" \
              --label "stale-plugin" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggregate metrics
        run: python3 docs/aggregate.py data docs/data.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
