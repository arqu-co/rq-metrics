name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: [data/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect bogus repo directories
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Exhaustive check: every data/<dir> must correspond to a real
          # arqu-co repository. Catches both worktree-pattern names AND
          # directory-style names (e.g. local clones whose directory name
          # diverged from the git remote). The previous pattern-only
          # detector missed directory-style names entirely — see PR #9.
          BOGUS=$(python3 docs/normalize_repo_names.py data --verify-org arqu-co \
            | awk '/^  / {print $1}' \
            | tr '\n' ' ' \
            | sed 's/ $//')
          echo "bogus=$BOGUS" >> "$GITHUB_OUTPUT"
          if [ -n "$BOGUS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Bogus repo directories detected: $BOGUS"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for bogus repo directories
        # Never block dashboard deploy on issue-bookkeeping failures. The
        # aggregate + deploy steps below MUST run even if this step fails
        # (missing label, rate limit, etc.).
        if: steps.detect.outputs.found == 'true'
        continue-on-error: true
        run: |
          NAMES="${{ steps.detect.outputs.bogus }}"
          # Ensure label exists; `--force` makes it idempotent.
          gh label create stale-plugin \
            --color "d73a4a" \
            --description "Data written by an outdated rq plugin version" \
            --force || true
          BODY="## Bogus repo directories need repair"
          BODY="$BODY"$'\n\n'"The following data/ directories do not correspond to any repository under arqu-co:"$'\n'
          for name in $NAMES; do
            BODY="$BODY"$'\n'"- \`$name\`"
          done
          BODY="$BODY"$'\n\n'"### How to fix"$'\n'
          BODY="$BODY"$'\n'"1. Identify the real repo (check branch names, file-path signatures inside the JSONs, or cross-reference \`gh search code\`)"
          BODY="$BODY"$'\n'"2. Run: \`python3 docs/normalize_repo_names.py data --repair NAME=REAL_REPO\`"
          BODY="$BODY"$'\n'"3. Commit and push"
          BODY="$BODY"$'\n\n'"### Prevention"$'\n'"Update the rq plugin: \`/rq:rq-update\` (v1.28.10+ resolves repo name from \`git remote get-url origin\` instead of directory basename)"
          EXISTING=$(gh issue list --label "stale-plugin" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "Bogus repo directories need repair" --label "stale-plugin" --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh arqu-co repo allowlist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 docs/refresh_repo_allowlist.py

      - name: Aggregate metrics
        run: python3 docs/aggregate.py data docs/data.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
