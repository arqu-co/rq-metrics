name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths: [data/**]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect worktree-named repos
        id: detect
        run: |
          BOGUS=$(python3 -c "
          from docs.normalize_repo_names import find_bogus_repos
          names = find_bogus_repos('data')
          print(' '.join(names))
          ")
          echo "bogus=$BOGUS" >> "$GITHUB_OUTPUT"
          if [ -n "$BOGUS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            # Collect committer info BEFORE moving directories
            COMMITTERS=""
            for name in $BOGUS; do
              COMMITTERS="$COMMITTERS$(git log --all --format='%an <%ae>' -- "data/$name/" | sort -u)\n"
            done
            COMMITTERS=$(echo -e "$COMMITTERS" | sort -u | grep -v '^$' || echo "unknown")
            # Store for notification step (multiline-safe)
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "committers<<$EOF_MARKER" >> "$GITHUB_OUTPUT"
            echo -e "$COMMITTERS" >> "$GITHUB_OUTPUT"
            echo "$EOF_MARKER" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Quarantine worktree-named data
        if: steps.detect.outputs.found == 'true'
        run: |
          python3 docs/normalize_repo_names.py data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: quarantine worktree-named metrics data" || true
          git push || true

      - name: Notify about outdated plugins
        if: steps.detect.outputs.found == 'true'
        run: |
          NAMES="${{ steps.detect.outputs.bogus }}"
          COMMITTERS="${{ steps.detect.outputs.committers }}"

          echo "::warning::Quarantined worktree-named repos: $NAMES"
          echo "::warning::Affected committers: $COMMITTERS"
          echo "::warning::Fix: run 'claude plugins update rq' to get v1.28.10+"

          BODY=$(cat <<'ISSUE_EOF'
          ## Worktree-named metrics detected

          The following repo names are Docker-style random names from worktrees,
          caused by rq plugin versions before v1.28.10:

          ISSUE_EOF
          )
          for name in $NAMES; do
            BODY="$BODY
          - \`$name\`"
          done
          BODY="$BODY

          ### Affected committers
          \`\`\`
          $COMMITTERS
          \`\`\`

          ### Fix
          Run \`claude plugins update rq\` to update to v1.28.10+ which resolves
          the real repository name even inside worktrees.

          Data has been moved to \`data/_quarantine/\` and excluded from the dashboard."

          EXISTING=$(gh issue list --label "stale-plugin" --state open --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Outdated rq plugin producing worktree-named metrics" \
              --label "stale-plugin" \
              --body "$BODY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aggregate metrics
        run: python3 docs/aggregate.py data docs/data.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
